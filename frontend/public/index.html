<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8"/>
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico"/>
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5,viewport-fit=cover"/>
    <meta name="theme-color" content="#b5451b"/>
    <meta name="mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
    <meta name="apple-mobile-web-app-title" content="ShopZen"/>
    <meta name="description" content="Premium online store — quality products delivered fast"/>
    <meta name="format-detection" content="telephone=no"/>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <!-- Default font preload (overridden by theme bootstrap below if cache exists) -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet"/>
    <title>ShopZen — Premium Online Store</title>

    <!--
      THEME BOOTSTRAP — runs synchronously before React mounts.
      Reads the cached settings from localStorage and applies CSS variables
      immediately so the correct theme is visible on the very first paint.
      No network request needed — just reads the cache ThemeContext writes.
    -->
    <script>
      (function () {
        var THEMES = {
          default:  { primary:'#b5451b', primaryDark:'#8b3214', primaryLight:'#e8643c', accent:'#f0a500', dark:'#0f172a', surface:'#1e293b', gradient:'linear-gradient(135deg,#b5451b 0%,#e8643c 50%,#f0a500 100%)', heroGradient:'linear-gradient(135deg,#0f172a 0%,#1e293b 50%,#b5451b 100%)', cardBg:'#ffffff', bodyBg:'#fafaf8' },
          ocean:    { primary:'#0369a1', primaryDark:'#024f7a', primaryLight:'#0ea5e9', accent:'#06b6d4', dark:'#0c1a2e', surface:'#0f2744', gradient:'linear-gradient(135deg,#0369a1 0%,#0ea5e9 50%,#06b6d4 100%)', heroGradient:'linear-gradient(135deg,#0c1a2e 0%,#0f2744 50%,#0369a1 100%)', cardBg:'#ffffff', bodyBg:'#f0f9ff' },
          forest:   { primary:'#15803d', primaryDark:'#0f5f2e', primaryLight:'#22c55e', accent:'#84cc16', dark:'#052e16', surface:'#0a3d20', gradient:'linear-gradient(135deg,#15803d 0%,#22c55e 50%,#84cc16 100%)', heroGradient:'linear-gradient(135deg,#052e16 0%,#0a3d20 50%,#15803d 100%)', cardBg:'#ffffff', bodyBg:'#f0fdf4' },
          royal:    { primary:'#7c3aed', primaryDark:'#5b21b6', primaryLight:'#a78bfa', accent:'#f59e0b', dark:'#1e1b4b', surface:'#2e1065', gradient:'linear-gradient(135deg,#7c3aed 0%,#a78bfa 50%,#f59e0b 100%)', heroGradient:'linear-gradient(135deg,#1e1b4b 0%,#2e1065 50%,#7c3aed 100%)', cardBg:'#ffffff', bodyBg:'#faf5ff' },
          rose:     { primary:'#be185d', primaryDark:'#9d174d', primaryLight:'#f43f5e', accent:'#fb7185', dark:'#1f0a14', surface:'#3b0a20', gradient:'linear-gradient(135deg,#be185d 0%,#f43f5e 50%,#fb7185 100%)', heroGradient:'linear-gradient(135deg,#1f0a14 0%,#3b0a20 50%,#be185d 100%)', cardBg:'#ffffff', bodyBg:'#fff1f2' },
          amber:    { primary:'#b45309', primaryDark:'#92400e', primaryLight:'#f59e0b', accent:'#fbbf24', dark:'#1c0a00', surface:'#451a03', gradient:'linear-gradient(135deg,#b45309 0%,#f59e0b 50%,#fbbf24 100%)', heroGradient:'linear-gradient(135deg,#1c0a00 0%,#451a03 50%,#b45309 100%)', cardBg:'#ffffff', bodyBg:'#fffbeb' },
          midnight: { primary:'#6366f1', primaryDark:'#4338ca', primaryLight:'#818cf8', accent:'#38bdf8', dark:'#0a0a0f', surface:'#111120', gradient:'linear-gradient(135deg,#4338ca 0%,#6366f1 50%,#38bdf8 100%)', heroGradient:'linear-gradient(135deg,#0a0a0f 0%,#111120 50%,#4338ca 100%)', cardBg:'#1a1a2e', bodyBg:'#0d0d1a' },
          coral:    { primary:'#f97316', primaryDark:'#ea580c', primaryLight:'#fb923c', accent:'#fcd34d', dark:'#1c0a00', surface:'#431407', gradient:'linear-gradient(135deg,#ea580c 0%,#f97316 50%,#fcd34d 100%)', heroGradient:'linear-gradient(135deg,#1c0a00 0%,#431407 50%,#ea580c 100%)', cardBg:'#ffffff', bodyBg:'#fff7ed' },
          slate:    { primary:'#334155', primaryDark:'#1e293b', primaryLight:'#475569', accent:'#38bdf8', dark:'#0f172a', surface:'#1e293b', gradient:'linear-gradient(135deg,#1e293b 0%,#334155 50%,#38bdf8 100%)', heroGradient:'linear-gradient(135deg,#0f172a 0%,#1e293b 50%,#334155 100%)', cardBg:'#ffffff', bodyBg:'#f8fafc' },
          sakura:   { primary:'#db2777', primaryDark:'#be185d', primaryLight:'#f472b6', accent:'#a78bfa', dark:'#1a0a14', surface:'#2d1020', gradient:'linear-gradient(135deg,#be185d 0%,#db2777 50%,#a78bfa 100%)', heroGradient:'linear-gradient(135deg,#1a0a14 0%,#2d1020 50%,#db2777 100%)', cardBg:'#ffffff', bodyBg:'#fdf2f8' },
          emerald:  { primary:'#059669', primaryDark:'#047857', primaryLight:'#34d399', accent:'#6ee7b7', dark:'#022c22', surface:'#064e3b', gradient:'linear-gradient(135deg,#047857 0%,#059669 50%,#34d399 100%)', heroGradient:'linear-gradient(135deg,#022c22 0%,#064e3b 50%,#047857 100%)', cardBg:'#ffffff', bodyBg:'#ecfdf5' },
          neon:     { primary:'#a855f7', primaryDark:'#7c3aed', primaryLight:'#c084fc', accent:'#22d3ee', dark:'#050010', surface:'#0d001a', gradient:'linear-gradient(135deg,#7c3aed 0%,#a855f7 50%,#22d3ee 100%)', heroGradient:'linear-gradient(135deg,#050010 0%,#0d001a 50%,#7c3aed 100%)', cardBg:'#0d001a', bodyBg:'#080010' },
        };
        var FONTS = {
          default: { display:"'Playfair Display',serif", body:"'DM Sans',sans-serif", url:'https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap' },
          modern:  { display:"'Poppins',sans-serif",     body:"'Inter',sans-serif",           url:'https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap' },
          elegant: { display:"'Cormorant Garamond',serif",body:"'Raleway',sans-serif",        url:'https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Raleway:wght@300;400;500;600;700&display=swap' },
          bold:    { display:"'Syne',sans-serif",        body:"'Work Sans',sans-serif",       url:'https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Work+Sans:wght@300;400;500;600&display=swap' },
          luxury:  { display:"'Bodoni Moda',serif",      body:"'Jost',sans-serif",            url:'https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@400;600;700&family=Jost:wght@300;400;500;600&display=swap' },
          tech:    { display:"'Space Grotesk',sans-serif",body:"'IBM Plex Sans',sans-serif",  url:'https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap' },
          minimal: { display:"'Outfit',sans-serif",      body:"'Nunito',sans-serif",          url:'https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Nunito:wght@300;400;500;600&display=swap' },
          classic: { display:"'Libre Baskerville',serif",body:"'Source Sans 3',sans-serif",   url:'https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Source+Sans+3:wght@300;400;500;600&display=swap' },
        };
        try {
          var raw = localStorage.getItem('shopzen_theme_settings');
          if (!raw) return;
          var s = JSON.parse(raw);
          var themeKey = s.theme || 'default';
          var t = THEMES[themeKey] || THEMES['default'];
          var root = document.documentElement;
          root.style.setProperty('--color-primary',       s.primaryColor      || t.primary);
          root.style.setProperty('--color-primary-dark',  s.primaryDarkColor  || t.primaryDark);
          root.style.setProperty('--color-primary-light', s.primaryLightColor || t.primaryLight);
          root.style.setProperty('--color-accent',        s.secondaryColor    || t.accent);
          root.style.setProperty('--color-dark',          s.darkBgColor       || t.dark);
          root.style.setProperty('--color-surface',       t.surface);
          root.style.setProperty('--theme-gradient',      t.gradient);
          root.style.setProperty('--hero-gradient',       t.heroGradient);
          root.style.setProperty('--card-bg',             t.cardBg);
          root.style.setProperty('--body-bg',             t.bodyBg);
          document.body.style.background = t.bodyBg;
          var fontKey = s.fontStyle || 'default';
          var f = FONTS[fontKey] || FONTS['default'];
          root.style.setProperty('--font-display', f.display);
          root.style.setProperty('--font-body',    f.body);
          // Inject font link early
          var link = document.createElement('link');
          link.id = 'theme-font'; link.rel = 'stylesheet'; link.href = f.url;
          document.head.appendChild(link);
          // Inject custom CSS early
          if (s.customCSS) {
            var style = document.createElement('style');
            style.id = 'custom-theme-css';
            style.textContent = s.customCSS;
            document.head.appendChild(style);
          }
        } catch(e) {}
      })();
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
